display_name: Quant Research
short_description: Quant, crypto, and alpha dossiers
default_prompt: Analyze this asset, protocol, contract, news item, bottleneck, or market situation with the quant-research workflow. Infer whether it is equity/ETF/macro or crypto/protocol/contract work; for crypto, use smart routing, EVM/Solana checks, tokenomics, security review, and on-chain forensics. For news, bottlenecks, product launches, or supply-chain shifts, use the Serenity-style workflow: observed demand change, financial-statement transmission, small-cap elasticity, market misclassification, and 1-4 quarter validation chain. Create or refresh the shared OmniCapital dossier, cite material claims, run reproducible analysis where artifacts are available, and return a concise decision-support summary with links.
